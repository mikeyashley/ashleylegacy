<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ashley — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script>
    // Already authenticated? Skip login
    if (sessionStorage.getItem('ashley_auth') === '1') {
      window.location.replace('/dashboard.html');
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0e10;
      --surface:   #18181b;
      --border:    #2a2a2f;
      --muted:     #71717a;
      --subtle:    #3f3f46;
      --text:      #fafafa;
      --text-2:    #a1a1aa;
      --accent:    #4f8ef7;
      --accent-h:  #3b7de8;
      --error:     #f87171;
      --radius:    12px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    /* WORDMARK */
    .wordmark {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2.5rem;
    }
    .wordmark-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .wordmark-text {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .wordmark-sub {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    /* CARD */
    .card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }
    .card-title {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.375rem;
    }
    .card-sub {
      font-size: 0.8125rem;
      color: var(--text-2);
      margin-bottom: 1.75rem;
      line-height: 1.5;
    }

    /* FORM */
    .field {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-2);
      margin-bottom: 0.375rem;
      letter-spacing: 0.01em;
    }
    input[type="password"] {
      width: 100%;
      padding: 0.6875rem 0.875rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.15s;
      letter-spacing: 0.05em;
    }
    input[type="password"]:focus {
      border-color: var(--accent);
    }
    input[type="password"]::placeholder {
      color: var(--subtle);
      letter-spacing: 0;
    }

    /* ERROR */
    .error-msg {
      display: none;
      font-size: 0.75rem;
      color: var(--error);
      margin-top: 0.375rem;
    }
    .error-msg.show { display: block; }

    /* BUTTON */
    button {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.75rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: -0.01em;
    }
    button:hover { background: var(--accent-h); }
    button:active { transform: scale(0.98); }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* FOOTER */
    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }

    /* SHAKE */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.35s ease; }
  </style>
</head>
<body>

  <div class="wordmark">
    <div class="wordmark-icon">A</div>
    <div>
      <div class="wordmark-text">Ashley</div>
      <div class="wordmark-sub">Command</div>
    </div>
  </div>

  <div class="card" id="loginCard">
    <p class="card-title">Welcome back</p>
    <p class="card-sub">Sign in to access your dashboard.</p>

    <form id="loginForm" autocomplete="off">
      <div class="field">
        <label for="pass">Passphrase</label>
        <input
          id="pass"
          type="password"
          placeholder="Enter passphrase"
          autofocus
          autocomplete="current-password"
        />
        <p class="error-msg" id="errorMsg">Incorrect passphrase. Try again.</p>
      </div>
      <button type="submit" id="submitBtn">Sign In →</button>
    </form>
  </div>

  <p class="footer">Ashley Command · Private</p>

  <script>
    // ── CHANGE THIS PASSPHRASE ──────────────────────────────────────────
    const PASSPHRASE = 'ashley2026';
    // ───────────────────────────────────────────────────────────────────

    const form    = document.getElementById('loginForm');
    const input   = document.getElementById('pass');
    const errMsg  = document.getElementById('errorMsg');
    const card    = document.getElementById('loginCard');
    const btn     = document.getElementById('submitBtn');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      btn.disabled = true;

      setTimeout(function() {
        if (input.value === PASSPHRASE) {
          sessionStorage.setItem('ashley_auth', '1');
          window.location.replace('/dashboard.html');
        } else {
          errMsg.classList.add('show');
          card.classList.add('shake');
          input.value = '';
          input.focus();
          card.addEventListener('animationend', function() {
            card.classList.remove('shake');
          }, { once: true });
        }
        btn.disabled = false;
      }, 200);
    });

    input.addEventListener('input', function() {
      errMsg.classList.remove('show');
    });
  </script>

</body>
</html>
